name: Trivy Security Scan

on:
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly disclosed CVEs
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  fs-scan:
    name: Filesystem Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy on filesystem (vuln + secret + misconfig)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          trivy-config: trivy.yaml
          cache: false

      - name: Upload filesystem scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  image-scan-amd:
    name: Container Image Scan (amd64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          push: false
          load: true
          platforms: linux/amd64
          tags: citiesapi:${{ github.sha }}
          cache-from: |
            type=gha,scope=buildkit-amd64
            type=gha,scope=buildkit-trivy-amd64
          cache-to: type=gha,mode=max,scope=buildkit-trivy-amd64

      - name: Run Trivy on container image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: citiesapi:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          trivy-config: trivy.yaml
          cache: false

      - name: Upload image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  image-scan-arm:
    name: Container Image Scan (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          push: false
          load: true
          platforms: linux/arm64
          tags: citiesapi:${{ github.sha }}
          cache-from: |
            type=gha,scope=buildkit-arm64
            type=gha,scope=buildkit-trivy-arm64
          cache-to: type=gha,mode=max,scope=buildkit-trivy-arm64

      - name: Run Trivy on container image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: citiesapi:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          trivy-config: trivy.yaml
          cache: false

      - name: Upload image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
