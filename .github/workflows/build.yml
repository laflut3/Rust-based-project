name: Build app

on:
  push:
    branches:
      - main
    paths:
      - migrations/**
      - src/**
      - tests/**
      - Cargo*
      - Dockerfile
  pull_request:
    branches:
      - main
    paths:
      - migrations/**
      - src/**
      - tests/**
      - Cargo*
      - Dockerfile
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CONTAINER_REGISTRY: ghcr.io

jobs:
  build-amd64:
    name: Build amd64 image
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          push: ${{ github.event_name == 'push' }} # Only push the image if we're on main
          platforms: linux/amd64
          outputs: type=image,name=${{ env.CONTAINER_REGISTRY }}/richarddorian/citiesapi,push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=buildkit-amd64
          cache-to: type=gha,mode=max,scope=buildkit-amd64

  build-arm64:
    name: Build arm64 image
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          push: ${{ github.event_name == 'push' }} # Only push the image if we're on main
          platforms: linux/arm64
          outputs: type=image,name=${{ env.CONTAINER_REGISTRY }}/richarddorian/citiesapi,push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=buildkit-arm64
          cache-to: type=gha,mode=max,scope=buildkit-arm64

  merge-manifest:
    name: Merge multi-arch image
    runs-on: ubuntu-24.04
    needs:
      - build-amd64
      - build-arm64
    if: github.event_name == 'push'
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Create and push manifest
        run: >-
          docker buildx imagetools create -t ${{ env.CONTAINER_REGISTRY }}/richarddorian/citiesapi:${{ github.sha }}
          ${{ env.CONTAINER_REGISTRY }}/richarddorian/citiesapi@${{ needs.build-amd64.outputs.digest }}
          ${{ env.CONTAINER_REGISTRY }}/richarddorian/citiesapi@${{ needs.build-arm64.outputs.digest }}
